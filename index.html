<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predição de Diabetes</title>
</head>

<body>
    <h1>Predição de Diabetes</h1>
    <p>Insira os valores para prever a probabilidade de diabetes em pacientes mulheres:</p>
    <form>
        <label>Glicose</label>
        <input type="number" id="glicose" min="0" max="300">
        <label>Idade</label>
        <input type="number" id="idade" min="1" max="120">
        <label>Pressão Arterial</label>
        <input type="number" id="pressao_arterial" min="0" max="200">
        <label>Gestações</label>
        <input type="number" id="gestacoes" min="0" max="20">
        <label>Espessura da Pele</label>
        <input type="number" id="espessura_pele" min="0" max="100">
        <label>Insulina</label>
        <input type="number" id="insulina" min="0" max="900">
        <label>IMC</label>
        <input type="number" id="imc" min="0" max="70">
        <label>Histórico Familiar</label>
        <input type="number" id="historico_familiar" min="0" max="3">
        <button type="button" onclick="prever()">Resultado</button>
        <div id="resultado"></div>
    </form>

    <script src="static/script.js"></script>
</body>

</html>
